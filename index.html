<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Core Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #05070b;
            font-family: 'Fredoka One', sans-serif;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            pointer-events: none;
        }
        /* عدد ۱۱ اصلی مرکز کاملاً درشت */
        .main-number {
            font-size: 240px;
            color: rgba(255, 255, 255, 0.12);
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.05);
            transition: color 1s ease, text-shadow 1s ease;
        }
        .main-number.complete {
            color: rgba(255, 255, 255, 0.95);
            text-shadow: 0 0 50px rgba(255, 255, 255, 0.7), 0 0 90px rgba(255, 255, 255, 0.3);
        }
        #tapHint {
            position: absolute;
            bottom: 15%;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
            z-index: 3;
            pointer-events: none;
            transition: opacity 0.5s ease;
            font-family: sans-serif;
        }
        #audioError {
            position: fixed;
            bottom: 10px;
            left: 10px;
            color: red;
            font-size: 12px;
            z-index: 999;
            background: rgba(0,0,0,0.7);
            padding: 5px;
            display: none;
        }
    </style>
</head>
<body>

    <div id="audioError">خطای صوتی</div>
    <div id="tapHint">لمس کنید تا موزیک و انیمیشن شروع شوند</div>
    
    <canvas id="spaceCanvas"></canvas>

    <div class="container">
        <div class="main-number" id="center11">11</div>
    </div>

    <audio id="bgMusic" src="music.mp3" preload="auto"></audio>

    <script>
        const canvas = document.getElementById('spaceCanvas');
        const ctx = canvas.getContext('2d');
        const center11 = document.getElementById('center11');
        const bgMusic = document.getElementById('bgMusic');
        const audioError = document.getElementById('audioError');
        const tapHint = document.getElementById('tapHint');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const mouse = { x: null, y: null, active: false, radius: 120 };
        const particleCount = 700; // تعداد ذرات برای شکل‌گیری یک قلب متراکم و کامل افزایش یافت
        const particles = [];
        
        let isPlaying = false; 
        let isTimeFor11 = false;
        let globalFrameCount = 0;
        const targets11 = [];

        bgMusic.addEventListener('error', () => {
            audioError.style.display = 'block';
            audioError.innerText = "خطا: فایل music.mp3 پیدا نشد یا فرمت آن خراب است.";
        });

        // محاسبه الگوریتم ریاضی برای چیدمان ذرات ۱رکورد به شکل قلب دور عدد مرکز
        function generateHeartPattern() {
            targets11.length = 0;
            const cx = width / 2;
            const cy = height / 2 - 15; // تراز کردن مرکز قلب با عدد ۱۱
            const scale = 11; // ابعاد و بزرگی قلب دور عدد مرکز

            for (let i = 0; i < particleCount; i++) {
                // تقسیم زاویه ۳۶۰ درجه بین تمام ذرات برای تقارن کامل قلب
                let angle = (i / particleCount) * Math.PI * 2; 
                
                // فرمول استاندارد کاردیوئید (قلب ریاضی)
                let tx = cx + scale * 16 * Math.pow(Math.sin(angle), 3);
                let ty = cy - scale * (13 * Math.cos(angle) - 5 * Math.cos(2 * angle) - 2 * Math.cos(3 * angle) - Math.cos(4 * angle));

                // اعمال یک لرزش جزئی فانتزی لبه‌ها
                tx += (Math.random() - 0.5) * 6;
                ty += (Math.random() - 0.5) * 6;
                
                targets11.push({ x: tx, y: ty });
            }
        }

        class Particle {
            constructor(index) {
                this.index = index;
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.returnX = this.x;
                this.returnY = this.y;
                this.baseSize = Math.random() * 2 + 4.5; 
                this.size = this.baseSize;
                this.speedX = (Math.random() - 0.5) * 1.5;
                this.speedY = (Math.random() - 0.5) * 1.5;
                this.opacity = Math.random() * 0.5 + 0.3;
                this.escapeTimer = 0; 
            }

            update() {
                let mainTargetX, mainTargetY;
                if (isTimeFor11 && targets11[this.index]) {
                    mainTargetX = targets11[this.index].x;
                    mainTargetY = targets11[this.index].y;
                } else {
                    this.returnX += this.speedX;
                    this.returnY += this.speedY;

                    if (this.returnX < 0 || this.returnX > width) this.speedX *= -1;
                    if (this.returnY < 0 || this.returnY > height) this.speedY *= -1;
                    
                    mainTargetX = this.returnX;
                    mainTargetY = this.returnY;
                }

                if (mouse.active && isPlaying) {
                    const dx = this.x - mouse.x;
                    const dy = this.y - mouse.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < mouse.radius) {
                        const force = (mouse.radius - distance) / mouse.radius;
                        this.x += (dx / (distance || 1)) * force * 12;
                        this.y += (dy / (distance || 1)) * force * 12;
                        this.escapeTimer = 120; 
                    }
                }

                if (this.escapeTimer > 0) {
                    this.escapeTimer--;
                    this.x += (mainTargetX - this.x) * 0.04;
                    this.y += (mainTargetY - this.y) * 0.04;
                } else {
                    this.x += (mainTargetX - this.x) * 0.08;
                    this.y += (mainTargetY - this.y) * 0.08;
                }
            }

            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.font = `700 ${this.size}px 'Fredoka One', sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('11', this.x, this.y);
            }
        }

        generateHeartPattern();
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle(i));
        }

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            generateHeartPattern();
        });

        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            if (isPlaying) {
                globalFrameCount++;
                // ۳ ثانیه بعد از موزیک (۳ ثانیه ضربدر ۶۰ فریم = فریم ۱۸۰): ذرات به شکل قلب دور عدد ۱۱ جمع می‌شوند
                if (!isTimeFor11 && globalFrameCount >= 180) {
                    isTimeFor11 = true;
                    center11.classList.add('complete');
                }
            }
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }

            requestAnimationFrame(animate);
        }

        const initAudioAndEffects = () => {
            if (isPlaying) return;

            // پخش آنی و ۱۰۰٪ تضمینی صدا در صدم ثانیه اول لمس صفحه
            bgMusic.play().then(() => {
                isPlaying = true;
                tapHint.style.opacity = '0'; 
                audioError.style.display = 'none';
            }).catch(err => {
                audioError.style.display = 'block';
                audioError.innerText = "خطای امنیتی مرورگر: " + err.message;
            });
        };

        window.addEventListener('click', initAudioAndEffects, { once: true });
        window.addEventListener('touchstart', initAudioAndEffects, { once: true });

        const startAction = (e) => {
            if (!isPlaying) return;
            mouse.active = true;
            const point = e.touches ? e.touches[0] : e;
            mouse.x = point.clientX;
            mouse.y = point.clientY;
        };

        const moveAction = (e) => {
            if (!mouse.active || !isPlaying) return;
            const point = e.touches ? e.touches[0] : e;
            mouse.x = point.clientX;
            mouse.y = point.clientY;
        };

        const endAction = () => { mouse.active = false; };

        window.addEventListener('mousedown', startAction);
        window.addEventListener('mousemove', moveAction, { passive: true });
        window.addEventListener('mouseup', endAction);
        window.addEventListener('touchstart', startAction, { passive: true });
        window.addEventListener('touchmove', moveAction, { passive: true });
        window.addEventListener('touchend', endAction);

        animate();
    </script>
</body>
</html>
