<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Core Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #05070b;
            font-family: 'Fredoka One', sans-serif;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            pointer-events: none;
        }
        .main-number {
            font-size: 150px;
            color: rgba(255, 255, 255, 0.12);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
            transition: color 1s ease, text-shadow 1s ease;
        }
        .main-number.complete {
            color: rgba(255, 255, 255, 0.95);
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.7), 0 0 70px rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>

    <canvas id="spaceCanvas"></canvas>

    <div class="container">
        <div class="main-number" id="center11">11</div>
    </div>

    <audio id="bgMusic" src="music.mp3" preload="auto"></audio>

    <script>
        const canvas = document.getElementById('spaceCanvas');
        const ctx = canvas.getContext('2d');
        const center11 = document.getElementById('center11');
        const bgMusic = document.getElementById('bgMusic');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const mouse = { x: null, y: null, active: false, radius: 110 };
        const particleCount = 600; 
        const particles = [];
        
        let isActivated = false; // وضعیت شروع با اولین لمس صفحه
        let isTimeFor11 = false;
        let globalFrameCount = 0;
        const targets11 = [];

        // چیدمان کاملاً منظم و هندسی ذرات ریز بر روی ساختار عدد 11 مرکز
        function generate11Pattern() {
            targets11.length = 0;
            const cx = width / 2;
            const cy = height / 2;
            const h = 135; 

            for (let i = 0; i < particleCount; i++) {
                let tx = cx;
                let ty = cy;
                
                if (i < particleCount / 2) {
                    // رقم اول (سمت چپ)
                    let p = i / (particleCount / 2);
                    tx = cx - 44; 
                    ty = cy - (h / 2) + (p * h);
                    
                    if (p < 0.22) {
                        let topP = p / 0.22;
                        tx = (cx - 44) - (topP * 24);
                        ty = (cy - h / 2) + (topP * 14);
                    }
                } else {
                    // رقم دوم (سمت راست)
                    let p = (i - particleCount / 2) / (particleCount / 2);
                    tx = cx + 44; 
                    ty = cy - (h / 2) + (p * h);
                    
                    if (p < 0.22) {
                        let topP = p / 0.22;
                        tx = (cx + 44) - (topP * 24);
                        ty = (cy - h / 2) + (topP * 14);
                    }
                }

                tx += (Math.random() - 0.5) * 4;
                ty += (Math.random() - 0.5) * 4;
                targets11.push({ x: tx, y: ty });
            }
        }

        class Particle {
            constructor(index) {
                this.index = index;
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.returnX = this.x;
                this.returnY = this.y;
                this.baseSize = Math.random() * 2 + 3.5; 
                this.size = this.baseSize;
                this.speedX = (Math.random() - 0.5) * 1.6;
                this.speedY = (Math.random() - 0.5) * 1.6;
                this.opacity = Math.random() * 0.5 + 0.3;
                this.escapeTimer = 0; 
            }

            update() {
                let mainTargetX, mainTargetY;
                if (isTimeFor11 && targets11[this.index]) {
                    mainTargetX = targets11[this.index].x;
                    mainTargetY = targets11[this.index].y;
                } else {
                    this.returnX += this.speedX;
                    this.returnY += this.speedY;

                    if (this.returnX < 0 || this.returnX > width) this.speedX *= -1;
                    if (this.returnY < 0 || this.returnY > height) this.speedY *= -1;
                    
                    mainTargetX = this.returnX;
                    mainTargetY = this.returnY;
                }

                if (mouse.active) {
                    const dx = this.x - mouse.x;
                    const dy = this.y - mouse.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < mouse.radius) {
                        const force = (mouse.radius - distance) / mouse.radius;
                        this.x += (dx / (distance || 1)) * force * 12;
                        this.y += (dy / (distance || 1)) * force * 12;
                        this.escapeTimer = 120; 
                    }
                }

                if (this.escapeTimer > 0) {
                    this.escapeTimer--;
                    this.x += (mainTargetX - this.x) * 0.04;
                    this.y += (mainTargetY - this.y) * 0.04;
                } else {
                    this.x += (mainTargetX - this.x) * 0.08;
                    this.y += (mainTargetY - this.y) * 0.08;
                }
            }

            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.font = `700 ${this.size}px 'Fredoka One', sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('11', this.x, this.y);
            }
        }

        // ایجاد اولیه ذرات و چیدمان پترن
        generate11Pattern();
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle(i));
        }

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            generate11Pattern();
        });

        // تابع اصلی انیمیشن
        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            if (isActivated) {
                globalFrameCount++;
                // ثانیه ۴ (فریم ۲۴۰ از زمان لمس): ذرات به صورت منظم فرم مرکز را کامل می‌کنند
                if (!isTimeFor11 && globalFrameCount >= 240) {
                    isTimeFor11 = true;
                    center11.classList.add('complete');
                }
            }
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }

            requestAnimationFrame(animate);
        }

        // تابع فعال‌ساز که با اولین لمس در هر جای صفحه اجرا می‌شود
        const handleFirstTouch = (e) => {
            if (isActivated) return;
            isActivated = true;

            // پخش آنی و فوری موزیک به محض اولین لمس صفحه
            bgMusic.play().catch(e => console.log("خطا در پخش مستقیم صدا: ", e));

            // تنظیم موقعیت اولیه ماوس/لمس برای اینکه در همان لحظه اول هم افکت فرار کار کند
            mouse.active = true;
            const point = e.touches ? e.touches[0] : e;
            mouse.x = point.clientX;
            mouse.y = point.clientY;

            // حذف شنونده‌های تاچ اول برای جلوگیری از اجرای مجدد این بلاک
            window.removeEventListener('mousedown', handleFirstTouch);
            window.removeEventListener('touchstart', handleFirstTouch);
        };

        // گوش به زنگ بودن برای اولین لمس یا کلیک روی صفحه
        window.addEventListener('mousedown', handleFirstTouch);
        window.addEventListener('touchstart', handleFirstTouch, { passive: false });

        // رویدادهای حرکتی استاندارد برای تعامل با ذرات
        const startAction = (e) => {
            if (!isActivated) return;
            mouse.active = true;
            const point = e.touches ? e.touches[0] : e;
            mouse.x = point.clientX;
            mouse.y = point.clientY;
        };

        const moveAction = (e) => {
            if (!mouse.active || !isActivated) return;
            const point = e.touches ? e.touches[0] : e;
            mouse.x = point.clientX;
            mouse.y = point.clientY;
        };

        const endAction = () => { mouse.active = false; };

        window.addEventListener('mousedown', startAction);
        window.addEventListener('mousemove', moveAction, { passive: true });
        window.addEventListener('mouseup', endAction);
        window.addEventListener('touchstart', startAction, { passive: true });
        window.addEventListener('touchmove', moveAction, { passive: true });
        window.addEventListener('touchend', endAction);

        // اجرای حلقه انیمیشن به محض باز شدن صفحه
        animate();
    </script>
</body>
</html>
