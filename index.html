<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فرم لاگین با افکت اژدهای بال‌دار</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0c1020;
            overflow: hidden;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-box {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            width: 350px;
        }
        .login-box h2 { color: #fff; margin-bottom: 30px; }
        .input-box { position: relative; margin-bottom: 30px; }
        .input-box input {
            width: 100%; padding: 10px; background: transparent;
            border: none; border-bottom: 2px solid #fff;
            outline: none; color: #fff; font-size: 16px;
        }
        .submit-btn {
            background: #fff; border: none; padding: 10px 20px;
            border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%;
        }
        canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>ورود به حساب</h2>
        <div class="input-box">
            <input type="text" placeholder="نام کاربری" required>
        </div>
        <div class="input-box">
            <input type="password" placeholder="رمز عبور" required>
        </div>
        <button class="submit-btn">ورود</button>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let pointer = { x: canvas.width / 2, y: canvas.height / 2 };
        let isTouching = false;
        let points = [];
        const numPoints = 25;
        let time = 0;

        for (let i = 0; i < numPoints; i++) {
            points.push({ x: pointer.x, y: pointer.y });
        }

        // بررسی لمس صفحه
        window.addEventListener('pointermove', (e) => {
            pointer.x = e.clientX;
            pointer.y = e.clientY;
            isTouching = true;
        });
        window.addEventListener('pointerdown', (e) => {
            pointer.x = e.clientX;
            pointer.y = e.clientY;
            isTouching = true;
        });
        window.addEventListener('pointerup', () => { isTouching = false; });
        window.addEventListener('pointerleave', () => { isTouching = false; });

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            time += 0.05;

            // ۱. حرکت خودکار در صورت عدم لمس صفحه
            if (!isTouching) {
                let centerX = canvas.width / 2;
                let centerY = canvas.height / 2;
                pointer.x = centerX + Math.cos(time * 0.5) * 250;
                pointer.y = centerY + Math.sin(time * 0.3) * 150;
            }

            // ۲. تنظیم سرعت بر اساس لمس صفحه (وقتی لمس بشه سریع‌تر تعقیب می‌کنه)
            let easeFactor = isTouching ? 0.4 : 0.08;
            points[0].x += (pointer.x - points[0].x) * easeFactor;
            points[0].y += (pointer.y - points[0].y) * easeFactor;

            for (let i = 1; i < numPoints; i++) {
                let p1 = points[i - 1];
                let p2 = points[i];
                let dx = p1.x - p2.x;
                let dy = p1.y - p2.y;
                let angle = Math.atan2(dy, dx);
                
                p2.x = p1.x - Math.cos(angle) * 12;
                p2.y = p1.y - Math.sin(angle) * 12;
            }

            // رسم بدن اژدها
            ctx.strokeStyle = '#58a6ff';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < numPoints; i++) {
                ctx.lineTo(points[i].x, points[i].y);
            }
            ctx.stroke();

            // ۳. رسم بال‌ها (فقط وقتی دست روی صفحه است باز و بسته می‌شوند)
            if (isTouching && points.length > 5) {
                // بال‌ها روی بند پنجم بدن اژدها قرار می‌گیرند
                let wingBase = points[4];
                let nextBase = points[3];
                let bodyAngle = Math.atan2(wingBase.y - nextBase.y, wingBase.x - nextBase.x);
                
                // زاویه بال زدن با زمان
                let wingFlap = Math.sin(time * 3) * 0.5;

                ctx.fillStyle = 'rgba(88, 166, 255, 0.4)';
                ctx.strokeStyle = '#58a6ff';
                ctx.lineWidth = 2;

                // بال چپ
                ctx.beginPath();
                ctx.moveTo(wingBase.x, wingBase.y);
                let leftWingX = wingBase.x + Math.cos(bodyAngle - Math.PI/2 + wingFlap) * 60;
                let leftWingY = wingBase.y + Math.sin(bodyAngle - Math.PI/2 + wingFlap) * 60;
                ctx.lineTo(leftWingX, leftWingY);
                ctx.lineTo(points[8].x, points[8].y); // اتصال به انتهای بدن برای شکل بال
                ctx.fill();
                ctx.stroke();

                // بال راست
                ctx.beginPath();
                ctx.moveTo(wingBase.x, wingBase.y);
                let rightWingX = wingBase.x + Math.cos(bodyAngle + Math.PI/2 - wingFlap) * 60;
                let rightWingY = wingBase.y + Math.sin(bodyAngle + Math.PI/2 - wingFlap) * 60;
                ctx.lineTo(rightWingX, rightWingY);
                ctx.lineTo(points[8].x, points[8].y);
                ctx.fill();
                ctx.stroke();
            }

            // رسم مفاصل بدن و سر
            for (let i = 0; i < numPoints; i += 2) {
                ctx.fillStyle = i === 0 ? '#ff5555' : '#ffffff';
                ctx.beginPath();
                ctx.arc(points[i].x, points[i].y, 10 - (i * 0.3), 0, Math.PI * 2);
                ctx.fill();
            }

            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
