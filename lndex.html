<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فرم ورود با اژدهای شگفت‌انگیز متحرک</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0b0d16;
            overflow: hidden;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-box {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.03);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-align: center;
            width: 340px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .login-box h2 { color: #fff; margin-bottom: 30px; font-weight: 300; letter-spacing: 1px; }
        .input-box { position: relative; margin-bottom: 30px; }
        .input-box input {
            width: 100%; padding: 12px; background: transparent;
            border: none; border-bottom: 1px solid rgba(255,255,255,0.3);
            outline: none; color: #fff; font-size: 16px;
            transition: 0.3s;
        }
        .input-box input:focus { border-bottom: 1px solid #fff; }
        .submit-btn {
            background: #fff; border: none; padding: 12px 20px;
            border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%;
            font-size: 16px; transition: 0.3s;
        }
        .submit-btn:active { transform: scale(0.98); }
        canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>ورود به حساب</h2>
        <div class="input-box">
            <input type="text" placeholder="نام کاربری" required>
        </div>
        <div class="input-box">
            <input type="password" placeholder="رمز عبور" required>
        </div>
        <button class="submit-btn">ورود</button>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let pointer = { x: canvas.width / 2, y: canvas.height / 2 };
        let isTouching = false;
        let points = [];
        const numPoints = 35; // طول بیشتر برای بدن اژدها
        let time = 0;

        // مقداردهی اولیه بندهای بدن اژدها
        for (let i = 0; i < numPoints; i++) {
            points.push({ x: pointer.x, y: pointer.y, angle: 0 });
        }

        // ردیابی لمس روی گوشی
        window.addEventListener('pointermove', (e) => {
            pointer.x = e.clientX;
            pointer.y = e.clientY;
            isTouching = true;
        });
        window.addEventListener('pointerdown', (e) => {
            pointer.x = e.clientX;
            pointer.y = e.clientY;
            isTouching = true;
        });
        window.addEventListener('pointerup', () => { isTouching = false; });
        window.addEventListener('pointerleave', () => { isTouching = false; });

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            time += isTouching ? 0.15 : 0.03; // افزایش سرعت انیمیشن در زمان لمس

            // ۱. حرکت خودکار و پرواز آرام وقتی دست روی صفحه نیست
            if (!isTouching) {
                let centerX = canvas.width / 2;
                let centerY = canvas.height / 2;
                pointer.x = centerX + Math.cos(time * 0.8) * (canvas.width * 0.3);
                pointer.y = centerY + Math.sin(time * 0.5) * (canvas.height * 0.25);
            }

            // ۲. تنظیم شتاب تعقیب (سرعت بیشتر هنگام لمس)
            let ease = isTouching ? 0.25 : 0.05;
            points[0].x += (pointer.x - points[0].x) * ease;
            points[0].y += (pointer.y - points[0].y) * ease;

            // محاسبه موقعیت مفاصل پشت سر هم
            for (let i = 1; i < numPoints; i++) {
                let p1 = points[i - 1];
                let p2 = points[i];
                let dx = p1.x - p2.x;
                let dy = p1.y - p2.y;
                let angle = Math.atan2(dy, dx);
                p2.angle = angle;
                
                let targetDist = i === 1 ? 15 : 10; // فاصله بندها
                p2.x = p1.x - Math.cos(angle) * targetDist;
                p2.y = p1.y - Math.sin(angle) * targetDist;
            }

            // ۳. رسم بال‌های چند لایه و پیشرفته اژدها (باز شدن و بال‌زدن فقط هنگام لمس)
            if (isTouching && points.length > 8) {
                let wingBase = points[5]; // محل اتصال بال روی ستون فقرات
                let angle = wingBase.angle;

                ctx.fillStyle = 'rgba(255, 255, 255, 0.04)';
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.lineWidth = 1.5;

                // زاویه نوسان بال زدن سریع
                let flap = Math.sin(time * 2) * 0.6;

                // رسم هر دو بال چپ و راست به صورت متقارن
                [-1, 1].forEach(side => {
                    ctx.beginPath();
                    ctx.moveTo(wingBase.x, wingBase.y);
                    
                    // استخوان اصلی بال
                    let wAngle1 = angle + (Math.PI / 2 * side) + flap * side;
                    let cp1x = wingBase.x + Math.cos(wAngle1) * 80;
                    let cp1y = wingBase.y + Math.sin(wAngle1) * 80;
                    
                    // پره‌های بال اژدها (مانند ویدیو)
                    ctx.lineTo(cp1x, cp1y);
                    
                    for(let k = 0; k < 4; k++) {
                        let offsetAngle = wAngle1 + (0.2 * k * side) + (side * 0.3);
                        let extendX = wingBase.x + Math.cos(offsetAngle) * (90 - k*10);
                        let extendY = wingBase.y + Math.sin(offsetAngle) * (90 - k*10);
                        ctx.lineTo(extendX, extendY);
                    }
                    
                    ctx.lineTo(points[12].x, points[12].y); // اتصال به انتهای کمر اژدها
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                });
            }

            // ۴. رسم ستون فقرات و شاخک‌های فرعی بدن (دقیقاً مشابه ساختار ویدیو)
            for (let i = numPoints - 1; i >= 0; i--) {
                let p = points[i];
                let size = i === 0 ? 12 : Math.max(2, 10 - (i * 0.25)); // ضخامت مخروطی بدن

                // رسم شاخک‌های کناری روی هر بند بدن برای ایجاد ظاهر اژدها
                if (i > 0 && i < numPoints - 5) {
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                    ctx.lineWidth = 1;
                    let sideAngle = p.angle + Math.PI / 2;
                    let spineLength = size * 1.8;
                    
                    ctx.beginPath();
                    ctx.moveTo(p.x - Math.cos(sideAngle)*spineLength, p.y - Math.sin(sideAngle)*spineLength);
                    ctx.lineTo(p.x + Math.cos(sideAngle)*spineLength, p.y + Math.sin(sideAngle)*spineLength);
                    ctx.stroke();
                }

                // رسم مهره‌های اصلی بدن
                ctx.fillStyle = i === 0 ? '#ffffff' : 'rgba(255,255,255,' + (1 - i/numPoints) + ')';
                ctx.beginPath();
                ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
                ctx.fill();
                
                // ایجاد هاله نوری در سر اژدها
                if(i === 0) {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, size * 2.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
